<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <title>Erro no login - Sorrisos do Amanhã</title>
    <style>
        * {
            box-sizing: border-box;
        }
 
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #111111;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
 
        .card {
            background-color: #1e1e1e;
            border: 0.5px solid #2a2a2a;
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
 
        .icone-circulo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: #2d1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
 
        .icone-circulo i {
            font-size: 28px;
            color: #e05555;
        }
 
        h1 {
            color: white;
            font-size: 1.3rem;
            font-weight: 500;
            margin: 0 0 0.75rem;
        }
 
        p {
            color: #969494;
            font-size: 14px;
            line-height: 1.6;
            margin: 0 0 1.5rem;
        }
 
        a.voltar {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: #2d1a1a;
            color: #e05555;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: 10px;
            border: 0.5px solid #4a2a2a;
        }
    </style>
</head>
<body>
 
    <div class="card">
        <div class="icone-circulo">
            <i class="ti ti-x"></i>
        </div>
        <h1>Acesso negado</h1>
        <p>Usuário ou senha incorretos. Verifique suas credenciais e tente novamente.</p>
        <a class="voltar" href="index.html">
            <i class="ti ti-arrow-left"></i> Tentar novamente
        </a>
    </div>
<script src="script.js"></script>
</body>
</html>
